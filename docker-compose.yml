services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hellojobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/hellojobs
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-random-32-bytes}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
    command: >
      sh -c "cd backend && alembic upgrade head && cd .. &&
             ADMIN_PASSWORD=$${ADMIN_PASSWORD} python -m backend.db.seed &&
             python api/server.py"

volumes:
  pgdata:
